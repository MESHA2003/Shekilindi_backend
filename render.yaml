services:
  - type: web
    name: herbal-clinic-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://herbal-clinic-frontend.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: SECURE_SSL_REDIRECT
        value: "True"
    databases:
      - name: herbal-clinic-db
        plan: free

databases:
  - name: herbal-clinic-db
    plan: free